{% extends 'base.html' %}
{% block title %}Confirmar exclusão{% endblock %}
{% block content %}
<div class="bg-white p-6 rounded shadow max-w-xl">
  <h2 class="text-2xl font-semibold mb-4 text-red-700">Confirmar exclusão</h2>
  <p class="mb-4">Tem certeza que deseja excluir <strong>{{ object }}</strong>?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Excluir</button>
    <a href=".." class="bg-gray-200 px-4 py-2 rounded hover:bg-gray-300">Cancelar</a>
  </form>
</div>
{% endblock %}
