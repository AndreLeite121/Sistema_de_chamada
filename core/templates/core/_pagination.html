{% load core_extras %}
{% if is_paginated %}
<div class="mt-4 flex gap-2 items-center">
  {% if page_obj.has_previous %}<a class="px-3 py-1 border rounded" href="?page={{ page_obj.previous_page_number }}{% querystring_without_page %}">«</a>{% endif %}
  <span class="text-sm text-gray-600">Página {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}</span>
  {% if page_obj.has_next %}<a class="px-3 py-1 border rounded" href="?page={{ page_obj.next_page_number }}{% querystring_without_page %}">»</a>{% endif %}
</div>
{% endif %}
