{% extends 'base.html' %}
{% block title %}{{ object.nome }}{% endblock %}
{% block content %}
<div class="bg-white p-6 rounded shadow max-w-xl">
  <h2 class="text-2xl font-semibold mb-4">{{ object.nome }}</h2>
  <dl class="grid grid-cols-2 gap-3">
    <dt class="font-medium">Matrícula</dt><dd>{{ object.matricula }}</dd>
    <dt class="font-medium">E-mail</dt><dd>{{ object.email }}</dd>
    <dt class="font-medium">Curso</dt><dd>{{ object.curso }}</dd>
    <dt class="font-medium">Usuário</dt><dd>{{ object.user|default:'-' }}</dd>
  </dl>
  <div class="mt-4"><a href="{% url 'aluno_list' %}" class="text-blue-600">← Voltar</a></div>
</div>
{% endblock %}
